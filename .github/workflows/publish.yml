# Publishes this n8n community node package to npm on version tag pushes.
#
# n8n verified community nodes must be published from GitHub Actions with
# npm provenance. Configure npm Trusted Publishing for this repository with:
# - Repository owner: viingx
# - Repository name: n8n-nodes-viingx
# - Workflow name: publish.yml
#
# If Trusted Publishing is not available, add an npm token as the NPM_TOKEN
# GitHub Actions secret instead.

name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate npm authentication
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is not configured. Add it in GitHub under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        run: |
          npm run lint
          npm run build

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION} to npm with provenance"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Bump the package version before publishing again."
            exit 1
          fi

          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
