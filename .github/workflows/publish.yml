# Publishes this n8n community node package to npm on version tag pushes.
#
# n8n verified community nodes must be published from GitHub Actions with
# npm provenance. Configure npm Trusted Publishing for this repository with:
# - Repository owner: viingx
# - Repository name: n8n-nodes-viingx
# - Workflow name: publish.yml
#
# If Trusted Publishing is not available, add an npm token as the NPM_TOKEN
# GitHub Actions secret instead.

name: Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          fi

          npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
