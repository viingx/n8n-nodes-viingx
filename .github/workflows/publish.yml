# Publishes this n8n community node package to npm on version tag pushes.
#
# n8n verified community nodes must be published from GitHub Actions with
# npm provenance. Configure npm Trusted Publishing for this repository with:
# - Repository owner: viingx
# - Repository name: n8n-nodes-viingx
# - Workflow name: publish.yml
#
# If Trusted Publishing is not available, add an npm token as the NPM_TOKEN
# GitHub Actions secret instead.

name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate npm authentication
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is not configured. Add it in GitHub under Settings -> Secrets and variables -> Actions."
            echo "NPM_TOKEN is not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          NPM_USER="$(npm whoami)"
          echo "Authenticated to npm as ${NPM_USER}"
          echo "Authenticated to npm as \`${NPM_USER}\`." >> "$GITHUB_STEP_SUMMARY"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check package version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Checking ${PACKAGE_NAME}@${PACKAGE_VERSION}"
          echo "Package: \`${PACKAGE_NAME}@${PACKAGE_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Bump the package version before publishing again."
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Bump the package version before publishing again." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet."
          echo "Version is available to publish." >> "$GITHUB_STEP_SUMMARY"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: |
          npm publish --provenance --access public --loglevel verbose
        env:
          RELEASE_MODE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
